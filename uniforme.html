<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uniforme | GZVB</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { padding-top: 70px; }

    #splash {
      position: fixed; inset: 0; background: #080808;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #splash.hidden { opacity: 0; visibility: hidden; }
    #splash svg { width: 90px; height: 90px; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.85); }
    }

    /* Leyenda diseño personalizado */
    .personalizado-notice {
      background: rgba(167,139,250,0.08);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #c4b5fd;
      font-size: 0.85rem;
      line-height: 1.6;
      margin-top: 20px;
    }

    /* MODAL BASE */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 9998; padding: 20px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-box {
      background: #111; border: 1px solid #2a2a2a;
      border-radius: 16px; padding: 32px 28px;
      width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-box h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; letter-spacing: 2px; margin-bottom: 10px;
    }
    .modal-notice {
      background: rgba(200,255,0,0.06);
      border: 1px solid rgba(200,255,0,0.2);
      border-radius: 8px; padding: 12px 14px;
      color: #aaa; font-size: 0.82rem; line-height: 1.6;
      margin-bottom: 22px;
    }
    .modal-field {
      display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px;
    }
    .modal-field label {
      font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 1.5px; color: #666;
    }
    .modal-field input, .modal-field textarea {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 8px; padding: 11px 14px;
      color: #f5f5f5; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; outline: none;
      transition: border-color 0.2s; width: 100%;
    }
    .modal-field input:focus, .modal-field textarea:focus { border-color: #c8ff00; }
    .modal-field textarea { resize: vertical; min-height: 90px; }

    .logo-upload-box {
      background: #1a1a1a; border: 1.5px dashed #2a2a2a;
      border-radius: 10px; padding: 20px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: border-color 0.2s; margin-top: 6px;
    }
    .logo-upload-box:hover { border-color: #c8ff00; }
    .logo-upload-box input { display: none; }
    .logo-upload-box span { color: #555; font-size: 0.82rem; }
    .logo-upload-name { color: #c8ff00 !important; }

    .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
    .modal-btn-primary {
      flex: 1; padding: 13px;
      background: #c8ff00; color: #000;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 2px;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-btn-primary:hover { opacity: 0.85; }
    .modal-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-btn-cancel {
      padding: 13px 20px; background: transparent; color: #666;
      border: 1px solid #2a2a2a; border-radius: 8px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; transition: border-color 0.2s, color 0.2s;
    }
    .modal-btn-cancel:hover { border-color: #ff4d4d; color: #ff4d4d; }
    .modal-error { color: #ff4d4d; font-size: 0.8rem; margin-top: 8px; display: none; }

    /* Confirmación */
    .pedido-confirm { text-align: center; padding: 10px 0; }
    .pedido-confirm .check-icon { font-size: 3rem; margin-bottom: 16px; }
    .pedido-confirm h3 { margin-bottom: 12px; }
    .pedido-confirm p { color: #aaa; font-size: 0.88rem; margin-bottom: 8px; }
    .clave-box {
      background: #1a1a1a; border: 1px solid #c8ff00;
      border-radius: 10px; padding: 16px;
      margin: 20px 0; text-align: center;
    }
    .clave-box small { color: #666; font-size: 0.75rem; display: block; margin-bottom: 6px; }
    .clave-box strong { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 4px; color: #c8ff00; }
  </style>
</head>
<body>

<div id="splash">

  </svg>
</div>

<div id="pageContent"></div>

<footer>
  <p>© 2026 · Diseño exclusivo de uniformes de voleibol</p>

<script src="js/main.js"></script>
<script>



let uniformeActual = null;

function hideSplash() {
  document.getElementById('splash').classList.add('hidden');
}

function generarClave() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let clave = '';
  for (let i = 0; i < 12; i++) {
    if (i > 0 && i % 4 === 0) clave += '-';
    clave += chars[Math.floor(Math.random() * chars.length)];
  }
  return clave;
}

// ─── MODAL DE PEDIDO ──────────────────────────────────────────
function abrirModalPedido(esPersonalizado) {
  cerrarModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-pedido';

  const tituloBtn = esPersonalizado ? 'Inspirar mi uniforme en este' : 'Quiero este diseño';
  const campoIdea = esPersonalizado ? `
    <div class="modal-field">
      <label>Describe tu idea de diseño</label>
      <textarea id="ped-idea" placeholder="Descríbeme tu idea…"></textarea>
    </div>` : '';

  overlay.innerHTML = `
    <div class="modal-box">
      <h3>${tituloBtn}</h3>
      <div class="modal-notice">
        ⚠️ En la compra de diseños ya realizados, la única modificación disponible será el cambio de logotipo. Es decir, únicamente podrás subir el logotipo de tu club o equipo deportivo.
      </div>

      <div class="modal-field">
        <label>Nombre completo</label>
        <input type="text" id="ped-nombre" placeholder="Tu nombre completo" autocomplete="name">
      </div>
      <div class="modal-field">
        <label>Correo electrónico</label>
        <input type="email" id="ped-correo" placeholder="tu@correo.com" autocomplete="email">
      </div>
      <div class="modal-field">
        <label>Número de teléfono</label>
        <input type="tel" id="ped-telefono" placeholder="Tu número de teléfono" autocomplete="tel">
      </div>
      <div class="modal-field">
        <label>Nombre del equipo</label>
        <input type="text" id="ped-equipo" placeholder="Nombre de tu club o equipo">
      </div>
      ${campoIdea}
      <div class="modal-field">
        <label>Logotipo del equipo (JPG, PNG, AI, CDR, SVG — máx. 25MB)</label>
        <div class="logo-upload-box" onclick="document.getElementById('ped-logo').click()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span id="ped-logo-name">Seleccionar logotipo (opcional)</span>
          <input type="file" id="ped-logo" accept="image/*,.ai,.cdr,.svg,.eps,.pdf"
            onchange="document.getElementById('ped-logo-name').textContent=this.files[0]?.name||'Seleccionar logotipo';document.getElementById('ped-logo-name').className='logo-upload-name'">
        </div>
      </div>

      <p class="modal-error" id="ped-error">Por favor completa los campos obligatorios.</p>

      <div class="modal-actions">
        <button class="modal-btn-cancel" onclick="cerrarModal()">Cancelar</button>
        <button class="modal-btn-primary" id="ped-btn" onclick="enviarPedido()">Realizar pedido</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('ped-nombre')?.focus(), 100);
}

function cerrarModal() {
  document.querySelectorAll('.modal-overlay').forEach(el => el.remove());
}

async function enviarPedido() {
  const nombre        = document.getElementById('ped-nombre').value.trim();
  const correo        = document.getElementById('ped-correo').value.trim();
  const telefono      = document.getElementById('ped-telefono').value.trim();
  const nombre_equipo = document.getElementById('ped-equipo').value.trim();
  const idea          = document.getElementById('ped-idea')?.value.trim() || null;
  const logoFile      = document.getElementById('ped-logo').files[0];
  const errEl         = document.getElementById('ped-error');
  const btn           = document.getElementById('ped-btn');

  if (!nombre || !correo || !telefono || !nombre_equipo) {
    errEl.style.display = 'block';
    errEl.textContent = 'Por favor completa todos los campos obligatorios.';
    return;
  }

  if (logoFile && logoFile.size > 25 * 1024 * 1024) {
    errEl.style.display = 'block';
    errEl.textContent = 'El logotipo no debe superar 25MB.';
    return;
  }

  errEl.style.display = 'none';
  btn.textContent = 'Enviando…';
  btn.disabled = true;

  const clave_descarga = generarClave();

  // Subir logo
  let logo_url = null;
  if (logoFile) {
    const ext      = logoFile.name.split('.').pop();
    const fileName = `${Date.now()}-${clave_descarga}.${ext}`;
    const { data: uploadData, error: uploadErr } = await sbMain.storage
      .from('logos-clientes').upload(fileName, logoFile, { upsert: false });
    if (!uploadErr) logo_url = uploadData?.path;
  }

  // Insertar pedido
  const { data: pedido, error: pedErr } = await sbMain.from('pedidos').insert({
    nombre, correo, telefono, nombre_equipo,
    uniforme_slug:    uniformeActual.slug,
    uniforme_nombre:  uniformeActual.nombre,
    logo_url,
    clave_descarga,
    descripcion_idea: idea,
  }).select().single();

  if (pedErr) {
    btn.textContent = 'Realizar pedido';
    btn.disabled = false;
    errEl.style.display = 'block';
    errEl.textContent = 'Error al enviar el pedido. Intenta de nuevo.';
    return;
  }

  // Notificar admin
  try {
    await fetch(EDGE_FUNCTION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
      body: JSON.stringify({
        tipo: 'pedido', nombre, correo, telefono, nombre_equipo,
        uniforme_nombre: uniformeActual.nombre,
        numero_pedido:   pedido.numero_pedido,
        clave_descarga,
        descripcion_idea: idea,
      }),
    });
  } catch(e) { console.error(e); }

  // Confirmación
  cerrarModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="pedido-confirm">
        <div class="check-icon">✅</div>
        <h3>¡Solicitud realizada!</h3>
        <p>Tu solicitud de diseño ha sido registrada exitosamente.</p>
        <p>Guarda tu clave única — la necesitarás para descargar tus archivos cuando estén listos:</p>
        <div class="clave-box">
          <small>Tu clave única de descarga</small>
          <strong>${clave_descarga}</strong>
        </div>
        <p style="color:#666;font-size:0.8rem">Pedido #${pedido.numero_pedido} · Te contactaremos a ${correo}</p>
        <button class="modal-btn-primary" style="margin-top:20px;width:100%" onclick="cerrarModal()">Entendido</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

// ─── CARGAR UNIFORME ──────────────────────────────────────────
async function cargarUniforme() {
  const params = new URLSearchParams(window.location.search);
  const slug   = params.get('slug');
  if (!slug) { window.location.href = 'index.html'; return; }

  const { data: u, error } = await sbMain
    .from('uniformes').select('*').eq('slug', slug).single();

  if (error || !u) { window.location.href = 'index.html'; return; }

  uniformeActual = u;
  document.title = `${u.nombre} | GZVB`;

  const esPersonalizado = u.tipo_diseno === 'personalizado';
  const baseImg = `${SUPABASE_URL}/storage/v1/object/public/imagenes-uniformes/${slug}`;
  const imgs    = [1,2,3].map(i =>
    `<img src="${baseImg}/foto-${i}.jpg" alt="${u.nombre} vista ${i}"
      loading="lazy" onerror="this.style.display='none'">`
  ).join('');

  const descargaHTML = u.descargas_activas !== false
    ? `<div id="download-btn-container"><span class="no-file-msg">Cargando…</span></div>`
    : '';

  // Botón según tipo
  const btnTexto = esPersonalizado ? 'Inspirar mi uniforme en este' : 'Quiero este diseño';

  // Leyenda para personalizados
  const leyendaPersonalizado = esPersonalizado ? `
    <div class="personalizado-notice">
      🎨 Este diseño personalizado no está a la venta, pero puedes inspirar tu diseño en este modelo.
    </div>` : '';

  document.getElementById('pageContent').innerHTML = `
    <header class="uniform-hero">
      <h1>${u.nombre}</h1>
      <p>${u.subtitulo || 'Uniforme de voleibol – alto rendimiento'}</p>
    </header>
    <section class="uniform-gallery">${imgs}</section>
    <section class="uniform-info">
      <h2>Concepto del diseño</h2>
      <p>${u.concepto || ''}</p>
      <ul>
        <li>Diseñado para voleibol</li>
        <li>Ideal para equipos competitivos</li>
        <li>Personalizable en colores y números</li>
      </ul>
      ${leyendaPersonalizado}
      <div class="btn-actions">
        <button class="btn" onclick="abrirModalPedido(${esPersonalizado})">${btnTexto}</button>
        ${descargaHTML}
      </div>
    </section>`;

  if (u.descargas_activas !== false) loadDownloadButton(slug);
  hideSplash();
}

cargarUniforme();
</script>
