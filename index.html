<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GZVB | Uniformes de Voleibol</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { padding-top: 70px; }

    .gallery-loading {
      grid-column: 1/-1;
      padding: 60px;
      text-align: center;
      color: #555;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }

    /* Skeleton loader */
    .card-skeleton {
      background: #111;
      border-radius: 12px;
      border: 1px solid #1a1a1a;
      overflow: hidden;
    }
    .skeleton-img {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    .skeleton-info {
      padding: 16px;
      background: #0f0f0f;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      margin-bottom: 8px;
    }
    .skeleton-line.short { width: 60%; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Badge no disponible */
    .card-wrapper { position: relative; }
    .badge-unavailable {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.85);
      color: #ff4d4d;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #ff4d4d;
      z-index: 2;
      pointer-events: none;
    }
    .card.inactive {
      opacity: 0.45;
      pointer-events: none;
      filter: grayscale(0.6);
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="logo"><img src="1.png" alt="GZVB Logo"></div>
    <ul class="nav-menu">
      <li><a href="#">Playeras</a></li>
      <li><a href="#">Shorts</a></li>
      <li><a href="#">Conjuntos</a></li>
    </ul>
  </div>
</nav>

<header class="hero">
  <div class="overlay">
    <h1>UNIFORMES DE VOLEIBOL</h1>
    <p>Diseño, identidad y rendimiento en la cancha</p>
  </div>
</header>

<section class="gallery" id="gallery">
  <!-- Skeletons mientras carga -->
  ${[...Array(4)].map(() => `
  <div class="card-skeleton">
    <div class="skeleton-img"></div>
    <div class="skeleton-info">
      <div class="skeleton-line"></div>
      <div class="skeleton-line short"></div>
    </div>
  </div>`).join('')}
</section>

<a href="https://wa.link/v7e1yu" class="whatsapp" target="_blank">WhatsApp</a>

<footer>
  <p>© 2026 · Diseño exclusivo de uniformes de voleibol</p>
</footer>

<script>
const SUPABASE_URL  = 'https://fwzubitfjthyhmmlrrkg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3enViaXRmanRoeWhtbWxycmtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTk2NTUsImV4cCI6MjA4OTU5NTY1NX0.ie3sQzRGewp-5Hw10wPy2ainfy8L-pgmDSUAA-YCo54';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

async function cargarGaleria() {
  const gallery = document.getElementById('gallery');

  const { data: uniformes, error } = await sb
    .from('uniformes')
    .select('slug, nombre, tipo, activo')
    .order('creado_at', { ascending: true });

  if (error || !uniformes || !uniformes.length) {
    gallery.innerHTML = '<div class="gallery-loading">No hay uniformes disponibles aún.</div>';
    return;
  }

  gallery.innerHTML = uniformes.map(u => {
    // Intentar WebP primero, fallback a jpg
    const imgBase = `${SUPABASE_URL}/storage/v1/object/public/imagenes-uniformes/${u.slug}`;
    const inactive = u.activo === false;

    return `
      <div class="card-wrapper">
        ${inactive ? '<span class="badge-unavailable">No disponible</span>' : ''}
        <a href="uniforme.html?slug=${u.slug}" class="card${inactive ? ' inactive' : ''}">
          <picture>
            <source srcset="${imgBase}/galeria.webp" type="image/webp">
            <img src="${imgBase}/galeria.jpg" alt="${u.nombre}"
              loading="lazy"
              onerror="this.closest('picture').parentElement.style.minHeight='200px';this.style.display='none'">
          </picture>
          <div class="card-info">
            <h3>${u.nombre}</h3>
            <p>${u.tipo || ''}</p>
          </div>
        </a>
      </div>`;
  }).join('');
}

cargarGaleria();
</script>
</body>
</html>
