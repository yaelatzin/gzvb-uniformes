<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GZVB | Uniformes de Voleibol</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { padding-top: 70px; }

    #splash {
      position: fixed; inset: 0; background: #080808;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #splash.hidden { opacity: 0; visibility: hidden; }
    #splash svg { width: 90px; height: 90px; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.85); }
    }

    .card-wrapper { position: relative; overflow: hidden; border-radius: 12px; }
    .badge-unavailable {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.85); color: #ff4d4d;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 4px 10px;
      border-radius: 20px; border: 1px solid #ff4d4d;
      z-index: 2; pointer-events: none;
    }
    .card.inactive { opacity: 0.45; pointer-events: none; filter: grayscale(0.6); }

    .gallery-loading {
      grid-column: 1/-1; padding: 60px; text-align: center;
      color: #555; font-size: 0.9rem; letter-spacing: 2px;
    }

    /* Filtros secundarios */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 20px 40px 0;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #666;
      padding: 7px 16px;
      border-radius: 20px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .filter-btn:hover { border-color: #c8ff00; color: #c8ff00; }
    .filter-btn.active { background: #c8ff00; color: #000; border-color: #c8ff00; }

    .category-title {
      padding: 24px 40px 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 3px;
      color: #c8ff00;
    }

    /* Link activo en navbar */
    .nav-menu li a.active { color: #c8ff00; border-bottom: 2px solid #c8ff00; padding-bottom: 2px; }

    @media (max-width: 768px) {
      .filter-bar { padding: 16px 16px 0; }
      .category-title { padding: 16px 16px 0; font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div id="splash">

</div>

<nav class="navbar">
  <div class="nav-container">
    <div class="logo"><img src="1.png" alt="GZVB Logo"></div>
    <div class="hamburger" onclick="this.nextElementSibling.classList.toggle('open')">
      <span></span><span></span><span></span>
    </div>
    <ul class="nav-menu">
      <li><a href="#" onclick="filtrar(null, null, this)" id="nav-todos" class="active">Todos</a></li>
      <li><a href="#" onclick="filtrar('playeras', null, this)">Playeras</a></li>
      <li><a href="#" onclick="filtrar('shorts-licras', null, this)">Shorts</a></li>
      <li><a href="#" onclick="filtrar('conjuntos', null, this)">Conjuntos</a></li>
      <li><a href="#" onclick="filtrar(null, 'personalizado', this)">Personalizados</a></li>
      <li><a href="#" onclick="filtrar(null, 'general', this)">General</a></li>
    </ul>
  </div>
</nav>

<header class="hero">
  <div class="overlay">
    <h1>UNIFORMES DE VOLEIBOL</h1>
    <p>Diseño, identidad y rendimiento en la cancha</p>
  </div>
</header>

<div id="category-title"></div>

<section class="gallery" id="gallery">
  <div class="gallery-loading">Cargando uniformes…</div>
</section>

<footer>
  <p>© 2026 · Diseño exclusivo de uniformes de voleibol</p>
</footer>

<script>
const SUPABASE_URL  = 'https://fwzubitfjthyhmmlrrkg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3enViaXRmanRoeWhtbWxycmtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTk2NTUsImV4cCI6MjA4OTU5NTY1NX0.ie3sQzRGewp-5Hw10wPy2ainfy8L-pgmDSUAA-YCo54';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let todosLosUniformes = [];

function hideSplash() {
  document.getElementById('splash').classList.add('hidden');
}

// Mezclar aleatoriamente
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderGaleria(uniformes) {
  const gallery = document.getElementById('gallery');
  if (!uniformes || !uniformes.length) {
    gallery.innerHTML = '<div class="gallery-loading">No hay uniformes en esta categoría.</div>';
    return;
  }

  gallery.innerHTML = uniformes.map(u => {
    const imgUrl = `${SUPABASE_URL}/storage/v1/object/public/imagenes-uniformes/${u.slug}/galeria.jpg`;
    const isInactive = u.activo === false;
    return `
      <div class="card-wrapper">
        ${isInactive ? '<span class="badge-unavailable">No disponible</span>' : ''}
        <a href="uniforme.html?slug=${u.slug}" class="card${isInactive ? ' inactive' : ''}">
          <img src="${imgUrl}" alt="${u.nombre}" loading="lazy"
            onerror="this.style.minHeight='200px';this.style.background='#1a1a1a';this.removeAttribute('src')">
          <div class="card-info">
            <h3>${u.nombre}</h3>
            <p>${u.tipo || ''}</p>
          </div>
        </a>
      </div>`;
  }).join('');
}

function filtrar(etiqueta, tipoDiseno, linkEl) {
  // Actualizar link activo
  document.querySelectorAll('.nav-menu a').forEach(a => a.classList.remove('active'));
  if (linkEl) linkEl.classList.add('active');

  // Título
  const titleEl = document.getElementById('category-title');
  const labels = {
    'playeras': 'Playeras', 'shorts-licras': 'Shorts / Licras',
    'conjuntos': 'Conjuntos', 'personalizado': 'Diseños Personalizados', 'general': 'Diseño General'
  };
  const titulo = etiqueta ? labels[etiqueta] : tipoDiseno ? labels[tipoDiseno] : null;
  titleEl.innerHTML = titulo ? `<div class="category-title">${titulo}</div>` : '';

  // Filtrar
  let filtrados = [...todosLosUniformes];
  if (etiqueta)    filtrados = filtrados.filter(u => u.etiqueta === etiqueta);
  if (tipoDiseno)  filtrados = filtrados.filter(u => u.tipo_diseno === tipoDiseno);
  if (!etiqueta && !tipoDiseno) filtrados = shuffle(filtrados); // Aleatorio en "Todos"

  renderGaleria(filtrados);
  document.querySelector('.nav-menu')?.classList.remove('open');
}

async function cargarGaleria() {
  const { data: uniformes, error } = await sb
    .from('uniformes')
    .select('slug, nombre, tipo, activo, etiqueta, tipo_diseno')
    .order('creado_at', { ascending: true });

  if (error || !uniformes || !uniformes.length) {
    document.getElementById('gallery').innerHTML = '<div class="gallery-loading">No hay uniformes disponibles aún.</div>';
    hideSplash();
    return;
  }

  todosLosUniformes = uniformes;
  renderGaleria(shuffle(todosLosUniformes)); // Todos en aleatorio por defecto
  hideSplash();
}

cargarGaleria();
</script>
</body>
</html>
