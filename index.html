<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GZVB | Uniformes de Voleibol</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { padding-top: 70px; }
    .gallery-loading {
      grid-column: 1/-1;
      padding: 60px;
      text-align: center;
      color: #555;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="logo"><img src="1.png" alt="GZVB Logo"></div>
    <ul class="nav-menu">
      <li><a href="#">Playeras</a></li>
      <li><a href="#">Shorts</a></li>
      <li><a href="#">Conjuntos</a></li>
    </ul>
  </div>
</nav>

<header class="hero">
  <div class="overlay">
    <h1>UNIFORMES DE VOLEIBOL</h1>
    <p>Diseño, identidad y rendimiento en la cancha</p>
  </div>
</header>

<section class="gallery" id="gallery">
  <div class="gallery-loading">Cargando uniformes…</div>
</section>

<a href="https://wa.link/v7e1yu" class="whatsapp" target="_blank">WhatsApp</a>

<footer>
  <p>© 2026 · Diseño exclusivo de uniformes de voleibol</p>
</footer>

<script>
const SUPABASE_URL  = 'https://fwzubitfjthyhmmlrrkg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3enViaXRmanRoeWhtbWxycmtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTk2NTUsImV4cCI6MjA4OTU5NTY1NX0.ie3sQzRGewp-5Hw10wPy2ainfy8L-pgmDSUAA-YCo54';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

async function cargarGaleria() {
  const gallery = document.getElementById('gallery');
  const { data: uniformes, error } = await sb
    .from('uniformes')
    .select('*')
    .order('creado_at', { ascending: true });

  if (error || !uniformes || !uniformes.length) {
    gallery.innerHTML = '<div class="gallery-loading">No hay uniformes disponibles aún.</div>';
    return;
  }

  gallery.innerHTML = uniformes.map(u => {
    const imgUrl = `${SUPABASE_URL}/storage/v1/object/public/imagenes-uniformes/${u.slug}/galeria.jpg`;
    return `
      <a href="uniforme.html?slug=${u.slug}" class="card">
        <img src="${imgUrl}" alt="${u.nombre}" onerror="this.style.minHeight='200px';this.style.background='#1a1a1a'">
        <div class="card-info">
          <h3>${u.nombre}</h3>
          <p>${u.tipo || ''}</p>
        </div>
      </a>`;
  }).join('');
}

cargarGaleria();
</script>
</body>
</html>
